<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찬솔의 합격 루틴</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; background: #0d0d14; color: #e8e4f0; font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; padding-bottom: 60px; }

/* Site Nav */
.site-nav { position: sticky; top: 0; z-index: 200; background: #07080f; border-bottom: 1px solid #ffffff0a; display: flex; align-items: center; gap: 4px; padding: 8px 16px; }
.site-nav-brand { font-size: 12px; font-weight: 800; color: #4f8ef7; margin-right: 8px; white-space: nowrap; }
.site-nav-link { padding: 5px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 700; color: #6666aa; transition: all .15s; }
.site-nav-link:hover { background: #1a1a2e; color: #e8e4f0; }
.site-nav-link.active { background: #1a1a2e; color: #e8e4f0; }
.nav-spacer { flex: 1; }
.edit-mode-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #4f8ef744; background: transparent; color: #4f8ef7; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; white-space: nowrap; }
.edit-mode-btn:hover { background: #4f8ef722; }
.edit-mode-btn.on { background: #4f8ef7; color: #fff; border-color: #4f8ef7; }

/* Header */
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 40px 24px 32px; border-bottom: 1px solid #ffffff12; position: relative; overflow: hidden; }
.circle { position: absolute; border-radius: 50%; border: 1px solid #ffffff08; }
.header-content { position: relative; }
.label-top { font-size: 11px; letter-spacing: 3px; color: #4f8ef7; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
.subtitle { margin-top: 10px; color: #9b9bb8; font-size: 13px; line-height: 1.6; }
.stats { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }
.stat-row { display: flex; justify-content: space-between; font-size: 11px; color: #9b9bb8; margin-bottom: 4px; }
.bar-bg { height: 5px; background: #ffffff10; border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; }

/* Tabs */
.tabs { display: flex; padding: 16px 24px 0; gap: 8px; }
.tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700; transition: all 0.2s; }
.tab-btn.on { background: #4f8ef7; color: #fff; }
.tab-btn.off { background: #1a1a2e; color: #6666aa; }

/* Schedule */
.schedule { padding: 16px 24px 0; display: flex; flex-direction: column; gap: 6px; }
.item { border-radius: 12px; padding: 12px 14px; transition: background .2s, border-color .2s; border: 1px solid #ffffff0a; background: #13131f; }
.item.clickable { cursor: pointer; }
.item-row { display: flex; align-items: center; gap: 12px; }
.item-time { font-size: 11px; color: #55556a; min-width: 38px; font-variant-numeric: tabular-nums; }
.item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.item-label { flex: 1; font-size: 14px; font-weight: 600; color: #e8e4f0; }
.item-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 99px; }
.item-arrow { font-size: 16px; color: #55556a; transition: transform 0.2s; user-select: none; }
.item-arrow.open { transform: rotate(180deg); }
.item-detail { margin-top: 10px; padding-top: 10px; font-size: 12px; color: #9b9bb8; line-height: 1.7; padding-left: 18px; display: none; }
.item-detail.show { display: block; }
.detail-duration { margin-left: 8px; font-weight: 700; }

/* Rules */
.section { padding: 28px 24px 0; }
.section-label { font-size: 11px; letter-spacing: 3px; color: #f7a94f; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; }
.rules { display: flex; flex-direction: column; gap: 8px; }
.rule { background: #13131f; border: 1px solid #ffffff0a; border-radius: 12px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; }
.rule-icon { font-size: 18px; flex-shrink: 0; }
.rule-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.rule-desc { font-size: 12px; color: #7777a0; line-height: 1.5; }

/* Strategy */
.strategy { margin: 28px 24px 0; background: #0f1a2e; border: 1px solid #4f8ef722; border-radius: 14px; padding: 18px 16px; }
.strategy-label { font-size: 11px; letter-spacing: 2px; color: #4f8ef7; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; }
.strategy-body { font-size: 13px; color: #9b9bb8; line-height: 1.8; white-space: pre-wrap; }
.strategy-note { margin-top: 8px; padding: 8px 10px; background: #4f8ef711; border-radius: 8px; color: #8ab4f8; font-size: 12px; }
.footer { padding: 24px 24px 0; font-size: 11px; color: #44445a; text-align: center; line-height: 1.7; white-space: pre-wrap; }

/* Edit Mode */
.editable { cursor: pointer; border-radius: 4px; transition: background .15s, outline .15s; }
.editable:hover { background: #4f8ef714; outline: 1.5px dashed #4f8ef766; }
.icon-btn { background: none; border: 1px solid #1c3d55; border-radius: 5px; cursor: pointer; font-size: 12px; padding: 2px 7px; line-height: 1.6; transition: all .15s; flex-shrink: 0; }
.icon-btn.edit { color: #4f8ef7; }
.icon-btn.edit:hover { background: #1a2a4a; }
.icon-btn.del { color: #e44444; }
.icon-btn.del:hover { background: #2a0a0a; }
.add-item-btn { background: #4f8ef718; border: 1px dashed #4f8ef755; color: #4f8ef7; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; padding: 7px 16px; width: 100%; margin-top: 4px; transition: all .15s; }
.add-item-btn:hover { background: #4f8ef728; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 500; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #0d1520; border: 1px solid #1c3d55; border-radius: 12px; padding: 20px; width: 92%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #e8e4f0; }
.mf { margin-bottom: 12px; }
.mf label { display: block; font-size: 11px; font-weight: 700; color: #6666aa; letter-spacing: .5px; margin-bottom: 4px; text-transform: uppercase; }
.mf input, .mf textarea, .mf select { width: 100%; background: #07080f; border: 1px solid #1c3d55; border-radius: 6px; color: #e8e4f0; padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; resize: vertical; }
.mf input:focus, .mf textarea:focus, .mf select:focus { border-color: #4f8ef7; }
.mf input[type=color] { height: 36px; padding: 2px 4px; cursor: pointer; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
.btn-cancel { background: #1a1a2e; border: 1px solid #2a2a4a; color: #9b9bb8; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn-ok { background: #4f8ef7; border: none; color: #fff; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 13px; }
.btn-cancel:hover { background: #252540; }
.btn-ok:hover { filter: brightness(1.1); }
.btn-danger { background: #2a0a0a; border: 1px solid #5a1a1a; color: #e44444; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-right: auto; }
.btn-danger:hover { background: #3a1010; }
</style>
</head>
<body>

<nav class="site-nav">
  <span class="site-nav-brand">&#127942; 앱 메뉴</span>
  <a href="index.html" class="site-nav-link">🎯 습관 게임</a>
  <a href="planner.html" class="site-nav-link active">📅 학습 플래너</a>
  <span class="nav-spacer"></span>
  <button id="edit-toggle" class="edit-mode-btn" onclick="toggleEditMode()">✏️ 편집</button>
</nav>

<div id="app"></div>

<div class="modal-overlay" id="edit-modal" onclick="handleOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="m-title">편집</h3>
    <div id="m-body"></div>
    <div class="modal-btns" id="m-btns"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'planner_data_v1';
let editMode = false;
let openIdx = null;
let currentTab = 'weekday';
let modalCb = null;

const DEF = {
  header: {
    title: "찬솔의 합격 루틴",
    subtitle: "TOEFL 70% · EJU 20% · 취미 10%\n하루 10시간+ · 7~9시 기상 · 현재 중급(60~80)",
    stats: [
      { label: "TOEFL", value: "7h/day", color: "#4f8ef7", pct: 70 },
      { label: "EJU",   value: "2h/day", color: "#f7a94f", pct: 20 },
      { label: "취미",  value: "1.5h/day", color: "#5fcf80", pct: 10 }
    ]
  },
  typeConfig: {
    toefl: { color: "#4f8ef7", bg: "#1a2a4a", label: "TOEFL" },
    eju:   { color: "#f7a94f", bg: "#3a2a10", label: "EJU" },
    hobby: { color: "#5fcf80", bg: "#0f2a1a", label: "취미" },
    life:  { color: "#9b8ea8", bg: "#1e1a25", label: "생활" },
    break: { color: "#6ee7e7", bg: "#0f2828", label: "휴식" }
  },
  schedule: {
    weekday: [
      { time:"07:30", label:"기상 · 세면 · 아침식사", type:"life", duration:60 },
      { time:"08:30", label:"TOEFL Reading", type:"toefl", duration:90, detail:"지문 2세트 + 어휘 암기 20개" },
      { time:"10:00", label:"TOEFL Listening", type:"toefl", duration:90, detail:"Lecture 3개 + Conversation 2개" },
      { time:"11:30", label:"휴식 · 가벼운 스트레칭", type:"break", duration:30 },
      { time:"12:00", label:"점심식사", type:"life", duration:60 },
      { time:"13:00", label:"TOEFL Speaking", type:"toefl", duration:60, detail:"Task 1~4 풀이 + 녹음 셀프 피드백" },
      { time:"14:00", label:"TOEFL Writing", type:"toefl", duration:90, detail:"Integrated 1편 + Independent 1편" },
      { time:"15:30", label:"휴식", type:"break", duration:30 },
      { time:"16:00", label:"EJU 일본어", type:"eju", duration:60, detail:"독해 1지문 + 기술 연습" },
      { time:"17:00", label:"EJU 수학 or 종합과목", type:"eju", duration:60, detail:"격일 교대 — 수학 문제풀이 / 종합과목 개념" },
      { time:"18:00", label:"저녁식사 · 휴식", type:"life", duration:60 },
      { time:"19:00", label:"TOEFL 복습 · 오답노트", type:"toefl", duration:90, detail:"당일 오답 정리 + 표현 암기" },
      { time:"20:30", label:"독서 (취미)", type:"hobby", duration:60, detail:"자유 독서 — 부담 없이" },
      { time:"21:30", label:"운동 (취미)", type:"hobby", duration:30, detail:"홈 트레이닝 or 산책" },
      { time:"22:00", label:"내일 계획 점검 · 취침 준비", type:"life", duration:60 },
      { time:"23:00", label:"취침", type:"life", duration:0 }
    ],
    weekend: [
      { time:"07:30", label:"기상 · 세면 · 아침식사", type:"life", duration:60 },
      { time:"08:30", label:"TOEFL 모의고사", type:"toefl", duration:180, detail:"주 1회 풀 세트 실전 연습 (R+L+S+W)" },
      { time:"11:30", label:"휴식", type:"break", duration:30 },
      { time:"12:00", label:"점심식사", type:"life", duration:60 },
      { time:"13:00", label:"모의고사 오답 분석", type:"toefl", duration:120, detail:"섹션별 약점 분류 + 노트 정리" },
      { time:"15:00", label:"EJU 종합 복습", type:"eju", duration:90, detail:"일본어 · 수학 · 종합과목 주간 정리" },
      { time:"16:30", label:"휴식", type:"break", duration:30 },
      { time:"17:00", label:"자유 시간 · 취미", type:"hobby", duration:120, detail:"독서 / 운동 / 유튜브 / 산책 — 완전한 휴식" },
      { time:"19:00", label:"저녁식사", type:"life", duration:60 },
      { time:"20:00", label:"다음 주 계획 설정", type:"life", duration:60, detail:"주간 목표 점검 + 다음 주 루틴 조정" },
      { time:"21:00", label:"가벼운 독서 · 취침 준비", type:"hobby", duration:60 },
      { time:"22:00", label:"취침", type:"life", duration:0 }
    ]
  },
  rules: [
    { icon:"⛔", title:"공부 중 스마트폰 금지", desc:"세션 시작 시 폰을 다른 방에 두거나 뒤집어 놓기" },
    { icon:"📋", title:"전날 밤 내일 계획 확인", desc:"22:00 루틴으로 '내일의 나'에게 명령서를 남긴다" },
    { icon:"📝", title:"주간 리뷰 (일요일 저녁)", desc:"목표 달성률 자가 채점 → 다음 주 조정" },
    { icon:"🔄", title:"격일 EJU 교대", desc:"월·수·금 수학 / 화·목·토 종합과목 — 단조로움 방지" },
    { icon:"🚫", title:"쉬는 시간에 공부 X", desc:"쉴 때는 진짜 쉬기 — 번아웃 예방이 지속력의 핵심" },
    { icon:"📊", title:"월 1회 TOEFL 모의 성적 기록", desc:"점수 변화 추적으로 동기 부여 유지" }
  ],
  strategy: {
    label: "현재 단계 전략 (60→80+)",
    body: "Reading: 매일 2지문 — 문단 구조 파악 + 추론형 위주\nListening: Lecture 음영 필기 습관 형성 최우선\nSpeaking: Task 1 템플릿 완성 → Task 3·4 통합형 순서\nWriting: Integrated 구조 고정 → Independent 논거 풀 구축",
    note: "📌 월 1회 Hackers 모의고사로 점수 추적 — 80 돌파 시 EJU 비중 조금씩 올릴 것"
  },
  footer: "매너리즘 방지: 2주마다 세션 순서를 소폭 변경하고\n월 1회 카페·도서관 등 장소 변화를 주세요."
};

function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEF));
  } catch(e) { return JSON.parse(JSON.stringify(DEF)); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

let data = loadData();

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-toggle');
  btn.className = 'edit-mode-btn' + (editMode ? ' on' : '');
  btn.textContent = editMode ? '✅ 완료' : '✏️ 편집';
  render();
}

function openModal(title, html, cb, onDel) {
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-body').innerHTML = html;
  modalCb = cb;
  const btns = document.getElementById('m-btns');
  btns.innerHTML = '';
  if(onDel) {
    const d = document.createElement('button');
    d.className = 'btn-danger'; d.textContent = '삭제';
    d.onclick = () => { onDel(); closeModal(); };
    btns.appendChild(d);
  }
  const c = document.createElement('button');
  c.className = 'btn-cancel'; c.textContent = '취소'; c.onclick = closeModal;
  const o = document.createElement('button');
  o.className = 'btn-ok'; o.textContent = '저장'; o.onclick = submitModal;
  btns.appendChild(c); btns.appendChild(o);
  document.getElementById('edit-modal').classList.add('open');
  setTimeout(() => { const f = document.querySelector('#m-body input,#m-body textarea'); if(f) f.focus(); }, 60);
}
function closeModal() { document.getElementById('edit-modal').classList.remove('open'); modalCb = null; }
function submitModal() { if(modalCb) modalCb(); closeModal(); }
function handleOverlay(e) { if(e.target.id === 'edit-modal') closeModal(); }
function v(id) { return document.getElementById(id).value; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(mkHeader());
  app.appendChild(mkTabs());
  app.appendChild(mkSchedule());
  app.appendChild(mkRules());
  app.appendChild(mkStrategy());
  app.appendChild(mkFooter());
}

function mkHeader() {
  const h = data.header;
  const wrap = document.createElement('div');
  wrap.className = 'header';
  wrap.innerHTML = `
    <div class="circle" style="width:200px;height:200px;top:-80px;right:-60px"></div>
    <div class="circle" style="width:320px;height:320px;top:-60px;right:-30px"></div>
    <div class="circle" style="width:440px;height:440px;top:-40px;right:0"></div>
    <div class="header-content">
      <div class="label-top">Study Master Plan</div>
      <h1 id="hdr-h1" class="${editMode?'editable':''}">${esc(h.title)}</h1>
      <p class="subtitle ${editMode?'editable':''}" id="hdr-sub">${esc(h.subtitle).replace(/\n/g,'<br>')}</p>
    </div>
    <div class="stats" id="stats-wrap"></div>
  `;
  if(editMode) {
    wrap.querySelector('#hdr-h1').onclick = () => openModal('제목 편집', `<div class="mf"><label>제목</label><input id="fv" value="${esc(h.title)}"></div>`, () => { data.header.title = v('fv'); save(); render(); });
    wrap.querySelector('#hdr-sub').onclick = () => openModal('부제목 편집', `<div class="mf"><label>부제목</label><textarea id="fv" rows="3">${esc(h.subtitle)}</textarea></div>`, () => { data.header.subtitle = v('fv'); save(); render(); });
  }
  const sw = wrap.querySelector('#stats-wrap');
  h.stats.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = editMode ? 'editable' : '';
    el.innerHTML = `<div class="stat-row"><span>${esc(s.label)}</span><span style="color:${s.color}">${esc(s.value)}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${s.pct}%;background:${s.color}"></div></div>`;
    if(editMode) el.onclick = () => openModal('통계 편집', `
      <div class="mf"><label>라벨</label><input id="fl" value="${esc(s.label)}"></div>
      <div class="mf"><label>값</label><input id="fv" value="${esc(s.value)}"></div>
      <div class="mf"><label>비율 (%)</label><input id="fp" type="number" min="0" max="100" value="${s.pct}"></div>
      <div class="mf"><label>색상</label><input id="fc" type="color" value="${s.color}"></div>
    `, () => { data.header.stats[i]={label:v('fl'),value:v('fv'),pct:parseInt(v('fp'))||0,color:v('fc')}; save(); render(); },
    () => { data.header.stats.splice(i,1); save(); render(); });
    sw.appendChild(el);
  });
  if(editMode) {
    const ab = document.createElement('button');
    ab.className = 'add-item-btn'; ab.textContent = '+ 통계 추가';
    ab.onclick = () => openModal('통계 추가', `
      <div class="mf"><label>라벨</label><input id="fl" placeholder="예: 독서"></div>
      <div class="mf"><label>값</label><input id="fv" placeholder="예: 1h/day"></div>
      <div class="mf"><label>비율 (%)</label><input id="fp" type="number" value="10"></div>
      <div class="mf"><label>색상</label><input id="fc" type="color" value="#9b8ea8"></div>
    `, () => { const l=v('fl').trim(); if(!l)return; data.header.stats.push({label:l,value:v('fv'),pct:parseInt(v('fp'))||0,color:v('fc')}); save(); render(); });
    sw.appendChild(ab);
  }
  return wrap;
}

function mkTabs() {
  const el = document.createElement('div');
  el.className = 'tabs';
  ['weekday','weekend'].forEach(tab => {
    const b = document.createElement('button');
    b.className = 'tab-btn ' + (currentTab===tab?'on':'off');
    b.textContent = tab==='weekday' ? '평일' : '주말';
    b.onclick = () => { currentTab=tab; openIdx=null; render(); };
    el.appendChild(b);
  });
  return el;
}

function mkSchedule() {
  const wrap = document.createElement('div');
  wrap.className = 'schedule';
  const items = data.schedule[currentTab];
  items.forEach((item, i) => wrap.appendChild(mkScheduleItem(item, i)));
  if(editMode) {
    const ab = document.createElement('button');
    ab.className = 'add-item-btn'; ab.textContent = '+ 일정 추가';
    ab.onclick = () => openScheduleModal(null);
    wrap.appendChild(ab);
  }
  return wrap;
}

function typeOpts(sel) {
  return Object.entries(data.typeConfig).map(([k,tv]) => `<option value="${k}" ${sel===k?'selected':''}>${tv.label}</option>`).join('');
}

function mkScheduleItem(item, i) {
  const cfg = data.typeConfig[item.type] || data.typeConfig.life;
  const hasDetail = !!item.detail;
  const isOpen = openIdx === i;
  const div = document.createElement('div');
  div.className = 'item' + (!editMode && hasDetail ? ' clickable' : '');
  if(isOpen) { div.style.background=cfg.bg; div.style.borderColor=cfg.color+'44'; }

  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <span class="item-time">${esc(item.time)}</span>
    <div class="item-dot" style="background:${cfg.color};box-shadow:0 0 6px ${cfg.color}88"></div>
    <span class="item-label">${esc(item.label)}</span>
    <div class="item-tag" style="background:${cfg.color}22;color:${cfg.color}">${cfg.label}</div>
  `;
  if(editMode) {
    const eb = document.createElement('button');
    eb.className='icon-btn edit'; eb.textContent='✏️'; eb.title='편집';
    eb.onclick = e => { e.stopPropagation(); openScheduleModal(i); };
    const db = document.createElement('button');
    db.className='icon-btn del'; db.textContent='✕'; db.title='삭제';
    db.onclick = e => { e.stopPropagation(); data.schedule[currentTab].splice(i,1); save(); render(); };
    row.appendChild(eb); row.appendChild(db);
  } else if(hasDetail) {
    const arr = document.createElement('span');
    arr.className = 'item-arrow' + (isOpen?' open':''); arr.textContent='▾';
    row.appendChild(arr);
  }
  div.appendChild(row);
  if(hasDetail) {
    const det = document.createElement('div');
    det.className = 'item-detail' + (isOpen?' show':'');
    det.innerHTML = esc(item.detail) + (item.duration>0 ? `<span class="detail-duration" style="color:${cfg.color}">(${item.duration}분)</span>` : '');
    div.appendChild(det);
  }
  if(!editMode && hasDetail) {
    div.onclick = () => { openIdx = (openIdx===i) ? null : i; render(); };
  }
  return div;
}

function openScheduleModal(i) {
  const isNew = i === null;
  const item = isNew ? {time:'',label:'',type:'life',duration:60,detail:''} : data.schedule[currentTab][i];
  openModal(isNew ? '일정 추가' : '일정 편집', `
    <div class="mf"><label>시간</label><input id="ft" value="${esc(item.time)}" placeholder="07:30"></div>
    <div class="mf"><label>제목</label><input id="fl" value="${esc(item.label)}" placeholder="활동명"></div>
    <div class="mf"><label>유형</label><select id="fty">${typeOpts(item.type)}</select></div>
    <div class="mf"><label>시간(분)</label><input id="fd" type="number" value="${item.duration||0}"></div>
    <div class="mf"><label>세부 내용 (없으면 비워두기)</label><textarea id="fdt" rows="2">${esc(item.detail||'')}</textarea></div>
  `, () => {
    const obj = { time:v('ft'), label:v('fl'), type:v('fty'), duration:parseInt(v('fd'))||0, detail:v('fdt').trim()||undefined };
    if(!obj.label) return;
    if(isNew) data.schedule[currentTab].push(obj);
    else data.schedule[currentTab][i] = obj;
    save(); render();
  }, isNew ? null : () => { data.schedule[currentTab].splice(i,1); save(); render(); });
}

function mkRules() {
  const wrap = document.createElement('div');
  wrap.className = 'section';
  const lbl = document.createElement('div');
  lbl.className = 'section-label'; lbl.textContent = '절제 원칙';
  wrap.appendChild(lbl);
  const list = document.createElement('div');
  list.className = 'rules';
  data.rules.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'rule';
    div.innerHTML = `<span class="rule-icon">${esc(r.icon)}</span><div style="flex:1"><div class="rule-title">${esc(r.title)}</div><div class="rule-desc">${esc(r.desc)}</div></div>`;
    if(editMode) {
      const bw = document.createElement('div');
      bw.style.cssText = 'display:flex;flex-direction:column;gap:4px;flex-shrink:0';
      const eb = document.createElement('button');
      eb.className='icon-btn edit'; eb.textContent='✏️';
      eb.onclick = () => openRuleModal(i);
      const db = document.createElement('button');
      db.className='icon-btn del'; db.textContent='✕';
      db.onclick = () => { data.rules.splice(i,1); save(); render(); };
      bw.appendChild(eb); bw.appendChild(db); div.appendChild(bw);
    }
    list.appendChild(div);
  });
  if(editMode) {
    const ab = document.createElement('button');
    ab.className='add-item-btn'; ab.textContent='+ 원칙 추가';
    ab.onclick = () => openRuleModal(null);
    list.appendChild(ab);
  }
  wrap.appendChild(list);
  return wrap;
}

function openRuleModal(i) {
  const isNew = i === null;
  const r = isNew ? {icon:'⭐',title:'',desc:''} : data.rules[i];
  openModal(isNew ? '원칙 추가' : '원칙 편집', `
    <div class="mf"><label>아이콘 (이모지)</label><input id="fi" value="${esc(r.icon)}" placeholder="⭐"></div>
    <div class="mf"><label>제목</label><input id="ft" value="${esc(r.title)}" placeholder="원칙 제목"></div>
    <div class="mf"><label>설명</label><textarea id="fd" rows="2">${esc(r.desc)}</textarea></div>
  `, () => {
    const t = v('ft').trim(); if(!t) return;
    const obj = { icon: v('fi')||'⭐', title: t, desc: v('fd') };
    if(isNew) data.rules.push(obj);
    else data.rules[i] = obj;
    save(); render();
  }, isNew ? null : () => { data.rules.splice(i,1); save(); render(); });
}

function mkStrategy() {
  const s = data.strategy;
  const wrap = document.createElement('div');
  wrap.className = 'strategy';

  const lbl = document.createElement('div');
  lbl.className = 'strategy-label' + (editMode?' editable':'');
  lbl.textContent = s.label;
  if(editMode) lbl.onclick = () => openModal('전략 제목 편집', `<div class="mf"><label>제목</label><input id="fv" value="${esc(s.label)}"></div>`, () => { data.strategy.label=v('fv'); save(); render(); });

  const body = document.createElement('div');
  body.className = 'strategy-body' + (editMode?' editable':'');
  body.textContent = s.body;
  if(editMode) body.onclick = () => openModal('전략 내용 편집', `<div class="mf"><label>내용 (줄바꿈 가능)</label><textarea id="fv" rows="6">${esc(s.body)}</textarea></div>`, () => { data.strategy.body=v('fv'); save(); render(); });

  const note = document.createElement('div');
  note.className = 'strategy-note' + (editMode?' editable':'');
  note.textContent = s.note;
  if(editMode) note.onclick = () => openModal('메모 편집', `<div class="mf"><label>메모</label><textarea id="fv" rows="2">${esc(s.note)}</textarea></div>`, () => { data.strategy.note=v('fv'); save(); render(); });

  wrap.appendChild(lbl); wrap.appendChild(body); wrap.appendChild(note);
  return wrap;
}

function mkFooter() {
  const el = document.createElement('div');
  el.className = 'footer' + (editMode?' editable':'');
  el.textContent = data.footer;
  if(editMode) el.onclick = () => openModal('푸터 편집', `<div class="mf"><label>내용</label><textarea id="fv" rows="3">${esc(data.footer)}</textarea></div>`, () => { data.footer=v('fv'); save(); render(); });
  return el;
}

render();
</script>
</body>
</html>
